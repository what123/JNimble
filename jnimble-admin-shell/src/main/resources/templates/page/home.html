<!doctype html>
<html lang="zh-CN"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="#{admin.home.title(${site?.nameOrFallback()})}">JNimble Admin</title>
</head>
<body>
  <h1 layout:fragment="page-title" th:text="#{admin.home.title(${site?.nameOrFallback()})}">JNimble Admin</h1>

  <main layout:fragment="content">
    <section class="admin-page-section">
      <div class="admin-page-section__header">
        <div>
          <p class="admin-shell__eyebrow">Overview</p>
          <h2>运行概览</h2>
        </div>
      </div>

      <div class="admin-dashboard-grid">
        <article class="admin-card">
          <span class="admin-card__label">Plugins</span>
          <strong>
            <span th:text="${pluginEnabled}">0</span>
            <small>/</small>
            <span th:text="${pluginTotal}">0</span>
          </strong>
          <p>启用插件 / 已安装插件</p>
        </article>
        <article class="admin-card">
          <span class="admin-card__label">Roles</span>
          <strong th:text="${roleTotal}">0</strong>
          <p>系统角色与插件权限统一授权</p>
        </article>
        <article class="admin-card">
          <span class="admin-card__label">Users</span>
          <strong th:text="${userTotal}">0</strong>
          <p>后台账户与角色绑定状态</p>
        </article>
      </div>

      <section class="admin-panel">
        <div class="admin-panel__header">
          <h2>最近操作</h2>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
            <tr>
              <th>时间</th>
              <th>动作</th>
              <th>对象</th>
              <th>结果</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(recentAudit)}">
              <td colspan="4" class="admin-muted">暂无操作记录。</td>
            </tr>
            <tr th:each="record : ${recentAudit}">
              <td class="admin-code" th:text="${record.occurredAt()}">2026-01-01T00:00:00Z</td>
              <td th:text="${actionDisplay[record.action()] ?: record.action()}">plugin.enable</td>
              <td>
                <span th:text="${targetTypeDisplay[record.targetType()] ?: record.targetType()}">plugin</span>
                <span th:if="${record.targetId() != null}"> / </span>
                <span th:if="${record.targetId() != null}" th:text="${record.targetId()}">crm</span>
              </td>
              <td>
                <span class="admin-status"
                      th:classappend="${record.outcome().name() == 'FAILURE'} ? ' admin-status--danger' : ''"
                      th:text="${outcomeDisplay[record.outcome().name()]}">SUCCESS</span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
</body>
</html>

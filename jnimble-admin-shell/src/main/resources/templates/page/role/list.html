<!doctype html>
<html lang="zh-CN"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>角色权限</title>
</head>
<body>
  <h1 layout:fragment="page-title">角色权限</h1>

  <main layout:fragment="content">
    <section class="admin-page-section">
      <div class="admin-page-section__header">
        <div>
          <p class="admin-shell__eyebrow">Authorization</p>
          <h2>角色列表</h2>
        </div>
        <a class="admin-button"
           th:if="${@controllerAuthorization.hasPermission('system.roles.manage')}"
           th:href="@{/admin/roles/create}">创建角色</a>
      </div>

      <div class="admin-notice admin-notice--success" th:if="${message}" th:text="${message}">角色已创建。</div>
      <div class="admin-notice admin-notice--error" th:if="${error}" th:text="${error}">失败原因。</div>

      <section class="admin-panel">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
            <tr>
              <th>角色名称</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(roles)}">
              <td colspan="3" class="admin-muted">暂无角色。</td>
            </tr>
            <tr th:each="role : ${roles}">
              <td th:text="${role.name()}">Administrator</td>
              <td><span class="admin-status" th:text="${role.status()}">ACTIVE</span></td>
              <td>
                <a class="admin-link" th:href="@{/admin/roles/{roleId}(roleId=${role.id()})}">编辑</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </section>

    </section>
  </main>
</body>
</html>

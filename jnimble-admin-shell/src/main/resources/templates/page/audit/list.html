<!doctype html>
<html lang="zh-CN"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>审计日志</title>
</head>
<body>
  <h1 layout:fragment="page-title">审计日志</h1>

  <main layout:fragment="content">
    <section class="admin-page-section">
      <div class="admin-page-section__header">
        <div>
          <p class="admin-shell__eyebrow">Audit</p>
          <h2>最近操作记录</h2>
        </div>
        <form class="admin-inline-form" method="get" th:action="@{/admin/audit}">
          <label>
            <span>条数</span>
            <input name="limit" type="number" min="1" max="500" th:value="${limit}">
          </label>
          <button class="admin-button admin-button--secondary" type="submit">刷新</button>
        </form>
      </div>

      <section class="admin-panel">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
            <tr>
              <th>时间</th>
              <th>操作人</th>
              <th>动作</th>
              <th>对象</th>
              <th>结果</th>
              <th>消息</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(records)}">
              <td colspan="6" class="admin-muted">暂无审计日志。</td>
            </tr>
            <tr th:each="record : ${records}">
              <td class="admin-code" th:text="${record.occurredAt()}">2026-01-01T00:00:00Z</td>
              <td th:text="${record.actor()}">admin</td>
              <td th:text="${actionDisplay[record.action()] ?: record.action()}">plugin.enable</td>
              <td>
                <span th:text="${targetTypeDisplay[record.targetType()] ?: record.targetType()}">plugin</span>
                <span th:if="${record.targetId() != null}"> / </span>
                <span th:if="${record.targetId() != null}" th:text="${record.targetId()}">crm</span>
              </td>
              <td>
                <span class="admin-status"
                      th:classappend="${record.outcome().name() == 'FAILURE'} ? ' admin-status--danger' : ''"
                      th:text="${outcomeDisplay[record.outcome().name()]}">SUCCESS</span>
              </td>
              <td class="admin-break" th:text="${record.message() ?: '-'}">-</td>
            </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
</body>
</html>

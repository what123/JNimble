spring:
  application:
    name: jnimble
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: ${JNIMBLE_DB_URL:jdbc:mysql://localhost:3306/jnimble?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${JNIMBLE_DB_USERNAME:jnimble}
    password: ${JNIMBLE_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration/system
    table: flyway_schema_history
    baseline-on-migrate: true

server:
  port: ${JNIMBLE_SERVER_PORT:8080}

jnimble:
  branding:
    logo-storage-dir: ${JNIMBLE_BRANDING_LOGO_DIR:./data/branding}
  security:
    default-user:
      username: ${JNIMBLE_DEFAULT_ADMIN_USERNAME:admin}
      password: ${JNIMBLE_DEFAULT_ADMIN_PASSWORD:}
      display-name: Administrator
      role: ADMIN
  plugins:
    dir: ${JNIMBLE_PLUGIN_DIR:./data/plugins}
    platform-version: 0.1.0
    configuration:
      key-file: ${JNIMBLE_PLUGIN_CONFIG_KEY_FILE:./data/plugin-config.key}
    dev-classpath-enabled: ${JNIMBLE_DEV_CLASSPATH_ENABLED:false}
    restore-enabled: true
    directory-scan-enabled: true
    directory-watch-enabled: true
    watch-settle-delay-millis: 1000
    auto-enable: true
    fail-fast: false

  hooks:
    fail-fast: false
